name: ci_314581046

# 在 push 與 pull_request 時自動觸發 pipeline
on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

# 同一分支若有新的 push，自動取消舊的執行，節省 Actions 資源
concurrency:
  group: ci-314581046-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: TypeScript / Prettier / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- 檢查 1：TypeScript 型別檢查 ----
      - name: TypeScript typecheck
        run: npm run typecheck

      # ---- 檢查 2：Prettier 格式檢查 ----
      - name: Prettier check
        run: npm run format:check

      # ---- 檢查 3：執行測試並輸出 JUnit 報告 ----
      # always() 確保即使測試失敗也會產出報告，供後續步驟顯示結果
      - name: Run tests
        if: always()
        run: |
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

      # ---- 將測試結果顯示於 GitHub Actions 結果頁面 ----
      # 使用 dorny/test-reporter 解析 JUnit XML，產生一個獨立的 Check 頁面
      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Vitest Results
          path: reports/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false

      # ---- 將測試摘要寫入 Job Summary，直接顯示在 Actions 執行頁面 ----
      - name: Write test summary
        if: always()
        run: |
          {
            echo "## 🧪 測試結果摘要"
            echo ""
            if [ -f reports/vitest-junit.xml ]; then
              TESTS=$(grep -o 'tests="[0-9]*"' reports/vitest-junit.xml | head -1 | grep -o '[0-9]*')
              FAILS=$(grep -o 'failures="[0-9]*"' reports/vitest-junit.xml | head -1 | grep -o '[0-9]*')
              ERRORS=$(grep -o 'errors="[0-9]*"' reports/vitest-junit.xml | head -1 | grep -o '[0-9]*')
              echo "| 項目 | 數量 |"
              echo "| --- | --- |"
              echo "| 總測試數 | ${TESTS:-0} |"
              echo "| 失敗 | ${FAILS:-0} |"
              echo "| 錯誤 | ${ERRORS:-0} |"
            else
              echo "⚠️ 找不到測試報告檔案。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- 上傳測試報告為 artifact，供下載查閱 ----
      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-314581046
          path: reports/
          if-no-files-found: warn